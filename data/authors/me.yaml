bio: |
  I am an Assistant Professor in the Department of Information Systems Engineering
  at Sakarya University (Faculty of Computer and Information Sciences). Previously,
  I was a Postdoc Researcher at the University of Iowa Hydroinformatics Lab (2023–2025).
  My research spans Hydroinformatics, IoT-based environmental monitoring, cloud computing,
  blockchain technologies, and distance education platforms.

